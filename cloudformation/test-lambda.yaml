AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lambda function for testing MSK Active-Active replication'

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    
  MSKClusterArn:
    Type: String
    Description: ARN of the MSK cluster to produce messages to
    
  MSKSecurityGroupId:
    Type: String
    Description: Security group ID for MSK access
    
  PrivateSubnetIds:
    Type: CommaDelimitedList
    Description: Private subnet IDs for Lambda VPC configuration
    
  KafkaTopicName:
    Type: String
    Default: opensearch-data

Resources:
  # IAM Role for Lambda
  # Note: RoleName is omitted to allow CloudFormation stack updates that require resource replacement
  TestLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole'
      Policies:
        - PolicyName: MSKAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'kafka-cluster:Connect'
                  - 'kafka-cluster:DescribeCluster'
                  - 'kafka-cluster:WriteData'
                  - 'kafka-cluster:DescribeTopic'
                  - 'kafka-cluster:CreateTopic'
                Resource:
                  - !Ref MSKClusterArn
                  - !Sub '${MSKClusterArn}/*'
              - Effect: Allow
                Action:
                  - 'kafka:GetBootstrapBrokers'
                  - 'kafka:DescribeCluster'
                Resource: !Ref MSKClusterArn

  # Lambda Function
  TestProducerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-msk-test-producer'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt TestLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      VpcConfig:
        SubnetIds: !Ref PrivateSubnetIds
        SecurityGroupIds:
          - !Ref MSKSecurityGroupId
      Environment:
        Variables:
          MSK_CLUSTER_ARN: !Ref MSKClusterArn
          KAFKA_TOPIC: !Ref KafkaTopicName
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          from datetime import datetime
          import random
          
          def handler(event, context):
              """
              Produce test messages to MSK cluster.
              Event format: {"count": 10, "source_region": "us-east-1"}
              """
              count = event.get('count', 10)
              source_region = event.get('source_region', os.environ.get('AWS_REGION', 'unknown'))
              topic = os.environ.get('KAFKA_TOPIC', 'opensearch-data')
              cluster_arn = os.environ.get('MSK_CLUSTER_ARN')
              
              # Get bootstrap servers
              kafka_client = boto3.client('kafka')
              response = kafka_client.get_bootstrap_brokers(ClusterArn=cluster_arn)
              bootstrap_servers = response.get('BootstrapBrokerStringSaslIam', '')
              
              if not bootstrap_servers:
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': 'Could not get bootstrap servers'})
                  }
              
              # Note: For actual Kafka production, you'd need kafka-python and aws-msk-iam-sasl-signer
              # This Lambda demonstrates the structure - for full implementation, use a Lambda layer
              
              messages = []
              for i in range(count):
                  msg = {
                      'timestamp': datetime.utcnow().isoformat() + 'Z',
                      'level': random.choice(['INFO', 'WARN', 'ERROR']),
                      'service': random.choice(['api-gateway', 'auth-service', 'user-service']),
                      'message': f'Test message {i+1} from {source_region}',
                      'request_id': f'req-{random.randint(100000, 999999)}',
                      'source_region': source_region,
                      'test_id': event.get('test_id', 'manual-test')
                  }
                  messages.append(msg)
              
              return {
                  'statusCode': 200,
                  'body': json.dumps({
                      'message': f'Would produce {count} messages to {topic}',
                      'bootstrap_servers': bootstrap_servers,
                      'sample_messages': messages[:3],
                      'note': 'For actual Kafka production, deploy with kafka-python layer'
                  })
              }

Outputs:
  LambdaFunctionArn:
    Description: ARN of the test Lambda function
    Value: !GetAtt TestProducerLambda.Arn
    
  LambdaFunctionName:
    Description: Name of the test Lambda function
    Value: !Ref TestProducerLambda
