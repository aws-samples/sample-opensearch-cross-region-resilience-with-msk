AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cross-Region Resilience for OpenSearch Service - Secondary Region Infrastructure'

Parameters:
  EnvironmentName:
    Type: String
    Default: production
    Description: Environment name prefix for resources
    
  UseExistingVPC:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to 'true' to use existing VPC, 'false' to use VPC from stack exports
    
  VpcId:
    Type: String
    Default: ''
    Description: VPC ID (required only if UseExistingVPC is true)
    
  PrivateSubnetIds:
    Type: CommaDelimitedList
    Default: ''
    Description: Comma-separated list of private subnet IDs (required only if UseExistingVPC is true)
    
  MSKInstanceType:
    Type: String
    Default: kafka.m5.large
    AllowedValues:
      - kafka.m5.large
      - kafka.m5.xlarge
      - kafka.m5.2xlarge
      - kafka.m5.4xlarge
    Description: MSK broker instance type
    
  MSKBrokerCount:
    Type: Number
    Default: 3
    MinValue: 2
    MaxValue: 15
    Description: Number of MSK brokers
    
  MSKBrokerStorageSize:
    Type: Number
    Default: 100
    MinValue: 1
    MaxValue: 16384
    Description: Storage size per broker in GB
    
  OSIMinCapacity:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 96
    Description: Minimum OCU capacity for OSI pipeline
    
  OSIMaxCapacity:
    Type: Number
    Default: 4
    MinValue: 1
    MaxValue: 96
    Description: Maximum OCU capacity for OSI pipeline
    
  PrimaryRegion:
    Type: String
    Default: us-east-1
    Description: Primary region for disaster recovery
    
  PrimaryMSKClusterArn:
    Type: String
    Description: ARN of the primary MSK cluster for replication setup

  PrimaryMSKSecurityGroupId:
    Type: String
    Default: ''
    Description: Security Group ID for primary MSK cluster (required for MSK Replicator)

  PrimaryPrivateSubnetIds:
    Type: CommaDelimitedList
    Default: ''
    Description: Comma-separated list of private subnet IDs from primary region (required for MSK Replicator)
    
  KafkaTopicName:
    Type: String
    Default: opensearch-data
    Description: Kafka topic name for data streaming

  DeployOSIPipeline:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to 'true' to deploy OSI pipeline (requires multi-VPC connectivity enabled on MSK first)

  DeployMSKReplicator:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Set to 'true' to deploy MSK Replicator for cross-region replication

Conditions:
  UseExistingVPCCondition: !Equals [!Ref UseExistingVPC, 'true']
  UseStackVPCCondition: !Equals [!Ref UseExistingVPC, 'false']
  DeployMSKReplicatorCondition: !Equals [!Ref DeployMSKReplicator, 'true']
  DeployOSIPipelineCondition: !Equals [!Ref DeployOSIPipeline, 'true']

Resources:
  # KMS Key for MSK Encryption
  MSKEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for MSK cluster encryption in secondary region
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow MSK to use the key
            Effect: Allow
            Principal:
              Service: kafka.amazonaws.com
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource: '*'

  MSKEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${EnvironmentName}-msk-secondary'
      TargetKeyId: !Ref MSKEncryptionKey

  # Security Groups
  MSKSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${EnvironmentName}-msk-secondary-sg'
      GroupDescription: Security group for MSK cluster in secondary region
      VpcId: !If 
        - UseExistingVPCCondition
        - !Ref VpcId
        - Fn::ImportValue: !Sub '${EnvironmentName}-vpc-id'
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-msk-secondary-sg'

  MSKSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref MSKSecurityGroup
      IpProtocol: tcp
      FromPort: 9098
      ToPort: 9098
      SourceSecurityGroupId: !Ref MSKSecurityGroup
      Description: Allow MSK IAM authentication

  MSKSecurityGroupEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref MSKSecurityGroup
      IpProtocol: -1
      CidrIp: 0.0.0.0/0
      Description: Allow all outbound traffic

  # MSK Cluster Configuration
  MSKConfiguration:
    Type: AWS::MSK::Configuration
    Properties:
      Name: !Sub '${EnvironmentName}-msk-secondary-config'
      Description: MSK cluster configuration for OpenSearch ingestion in secondary region
      ServerProperties: |
        auto.create.topics.enable=true
        default.replication.factor=3
        min.insync.replicas=2
        num.io.threads=8
        num.network.threads=5
        num.replica.fetchers=2
        replica.lag.time.max.ms=30000
        socket.receive.buffer.bytes=102400
        socket.request.max.bytes=104857600
        socket.send.buffer.bytes=102400
        unclean.leader.election.enable=false
        zookeeper.session.timeout.ms=18000
        compression.type=snappy
        log.retention.hours=24
        log.segment.bytes=1073741824

  # MSK Cluster
  MSKCluster:
    Type: AWS::MSK::Cluster
    Properties:
      ClusterName: !Sub '${EnvironmentName}-msk-secondary'
      KafkaVersion: 3.6.0
      NumberOfBrokerNodes: !Ref MSKBrokerCount
      BrokerNodeGroupInfo:
        InstanceType: !Ref MSKInstanceType
        ClientSubnets: !If
          - UseExistingVPCCondition
          - !Ref PrivateSubnetIds
          - - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-1'
            - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-2'
            - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-3'
        SecurityGroups:
          - !Ref MSKSecurityGroup
        StorageInfo:
          EBSStorageInfo:
            VolumeSize: !Ref MSKBrokerStorageSize
      ConfigurationInfo:
        Arn: !GetAtt MSKConfiguration.Arn
        Revision: 1
      EncryptionInfo:
        EncryptionInTransit:
          ClientBroker: TLS
          InCluster: true
        EncryptionAtRest:
          DataVolumeKMSKeyId: !Ref MSKEncryptionKey
      ClientAuthentication:
        Sasl:
          Iam:
            Enabled: true
      EnhancedMonitoring: PER_TOPIC_PER_BROKER
      LoggingInfo:
        BrokerLogs:
          CloudWatchLogs:
            Enabled: true
            LogGroup: !Ref MSKLogGroup
      Tags:
        Environment: !Ref EnvironmentName
        Region: Secondary

  # MSK Cluster Policy - Required for OSI and MSK Replicator to connect
  MSKClusterPolicy:
    Type: AWS::MSK::ClusterPolicy
    Properties:
      ClusterArn: !GetAtt MSKCluster.Arn
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: osis-pipelines.amazonaws.com
            Action:
              - 'kafka:CreateVpcConnection'
              - 'kafka:GetBootstrapBrokers'
              - 'kafka:DescribeCluster'
              - 'kafka:DescribeClusterV2'
            Resource: !GetAtt MSKCluster.Arn
          - Effect: Allow
            Principal:
              Service: kafka.amazonaws.com
            Action:
              - 'kafka:CreateVpcConnection'
              - 'kafka:GetBootstrapBrokers'
              - 'kafka:DescribeCluster'
              - 'kafka:DescribeClusterV2'
            Resource: !GetAtt MSKCluster.Arn

  # CloudWatch Log Group for MSK
  MSKLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/msk/${EnvironmentName}-secondary'
      RetentionInDays: 7

  # Lambda function to get MSK bootstrap brokers
  GetBootstrapBrokersLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-get-bootstrap-brokers-secondary-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: MSKDescribe
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'kafka:GetBootstrapBrokers'
                  - 'kafka:DescribeCluster'
                Resource: '*'

  GetBootstrapBrokersLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${EnvironmentName}-get-bootstrap-brokers-secondary'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt GetBootstrapBrokersLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          
          def handler(event, context):
              print(f"Event: {json.dumps(event)}")
              
              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return
              
              try:
                  cluster_arn = event['ResourceProperties']['ClusterArn']
                  client = boto3.client('kafka')
                  
                  response = client.get_bootstrap_brokers(ClusterArn=cluster_arn)
                  
                  bootstrap_brokers = response.get('BootstrapBrokerStringSaslIam', '')
                  
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                      'BootstrapBrokersSaslIam': bootstrap_brokers
                  })
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  MSKBootstrapBrokers:
    Type: Custom::MSKBootstrapBrokers
    DependsOn: MSKCluster
    Properties:
      ServiceToken: !GetAtt GetBootstrapBrokersLambda.Arn
      ClusterArn: !Ref MSKCluster

  # IAM Role for MSK Replicator
  MSKReplicatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-msk-replicator-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: kafka.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: MSKReplicatorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Cluster-level permissions
              - Effect: Allow
                Action:
                  - 'kafka-cluster:Connect'
                  - 'kafka-cluster:DescribeCluster'
                  - 'kafka-cluster:AlterCluster'
                  - 'kafka-cluster:DescribeClusterDynamicConfiguration'
                Resource:
                  - !Ref PrimaryMSKClusterArn
                  - !GetAtt MSKCluster.Arn
              # Topic-level permissions
              - Effect: Allow
                Action:
                  - 'kafka-cluster:ReadData'
                  - 'kafka-cluster:DescribeTopic'
                  - 'kafka-cluster:WriteData'
                  - 'kafka-cluster:CreateTopic'
                  - 'kafka-cluster:AlterTopic'
                  - 'kafka-cluster:DeleteTopic'
                  - 'kafka-cluster:DescribeTopicDynamicConfiguration'
                  - 'kafka-cluster:AlterTopicDynamicConfiguration'
                Resource:
                  - !Sub 'arn:aws:kafka:${PrimaryRegion}:${AWS::AccountId}:topic/${EnvironmentName}-msk-primary/*'
                  - !Sub 'arn:aws:kafka:${AWS::Region}:${AWS::AccountId}:topic/${EnvironmentName}-msk-secondary/*'
              # Consumer group permissions
              - Effect: Allow
                Action:
                  - 'kafka-cluster:DescribeGroup'
                  - 'kafka-cluster:AlterGroup'
                  - 'kafka-cluster:DeleteGroup'
                Resource:
                  - !Sub 'arn:aws:kafka:${PrimaryRegion}:${AWS::AccountId}:group/${EnvironmentName}-msk-primary/*'
                  - !Sub 'arn:aws:kafka:${AWS::Region}:${AWS::AccountId}:group/${EnvironmentName}-msk-secondary/*'
              # EC2 permissions for network interfaces
              - Effect: Allow
                Action:
                  - 'ec2:CreateNetworkInterface'
                  - 'ec2:DescribeNetworkInterfaces'
                  - 'ec2:DeleteNetworkInterface'
                  - 'ec2:DescribeSubnets'
                  - 'ec2:DescribeVpcs'
                  - 'ec2:DescribeSecurityGroups'
                Resource: '*'

  # MSK Replicator (Primary → Secondary)
  # NOTE: For true Active-Active, you need TWO replicators:
  #   1. Primary → Secondary (this one, deployed in secondary region)
  #   2. Secondary → Primary (deploy separately in primary region)
  # Uses IDENTICAL topic naming mode so same topic names exist in both regions.
  # MSK Replicator uses Kafka headers to prevent infinite replication loops.
  # For cross-region replication, each cluster needs VPC config from its own region.
  # Deploy MSK Replicator via CLI if CloudFormation times out (takes 15-30 min).
  MSKReplicator:
    Type: AWS::MSK::Replicator
    Condition: DeployMSKReplicatorCondition
    DependsOn: MSKCluster
    Properties:
      ReplicatorName: !Sub '${EnvironmentName}-primary-to-secondary'
      Description: Active-Active replication from primary to secondary with identical topic names
      ServiceExecutionRoleArn: !GetAtt MSKReplicatorRole.Arn
      KafkaClusters:
        # Primary cluster - uses VPC config from PRIMARY region
        - AmazonMskCluster:
            MskClusterArn: !Ref PrimaryMSKClusterArn
          VpcConfig:
            SubnetIds: !Ref PrimaryPrivateSubnetIds
            SecurityGroupIds:
              - !Ref PrimaryMSKSecurityGroupId
        # Secondary cluster - uses VPC config from THIS (secondary) region
        - AmazonMskCluster:
            MskClusterArn: !GetAtt MSKCluster.Arn
          VpcConfig:
            SubnetIds: !If
              - UseExistingVPCCondition
              - !Ref PrivateSubnetIds
              - - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-1'
                - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-2'
                - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-3'
            SecurityGroupIds:
              - !Ref MSKSecurityGroup
      ReplicationInfoList:
        - SourceKafkaClusterArn: !Ref PrimaryMSKClusterArn
          TargetKafkaClusterArn: !GetAtt MSKCluster.Arn
          TargetCompressionType: SNAPPY
          TopicReplication:
            TopicsToReplicate:
              - !Ref KafkaTopicName
            CopyTopicConfigurations: true
            CopyAccessControlListsForTopics: false
            DetectAndCopyNewTopics: true
            TopicNameConfiguration:
              Type: IDENTICAL
          ConsumerGroupReplication:
            ConsumerGroupsToReplicate:
              - '.*'
            DetectAndCopyNewConsumerGroups: true

  # S3 Bucket for DLQ
  DLQBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${EnvironmentName}-opensearch-dlq-${AWS::Region}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireDLQMessages
            Status: Enabled
            ExpirationInDays: 30

  # OpenSearch Serverless Collection
  OpenSearchCollection:
    Type: AWS::OpenSearchServerless::Collection
    DependsOn:
      - OpenSearchEncryptionPolicy
      - OpenSearchNetworkPolicy
      - OpenSearchDataAccessPolicy
    Properties:
      Name: !Sub '${EnvironmentName}-opensearch-secondary'
      Type: TIMESERIES
      Description: Secondary region OpenSearch Serverless collection

  # OpenSearch Serverless Security Policies
  OpenSearchEncryptionPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub '${EnvironmentName}-encryption-secondary'
      Type: encryption
      Policy: !Sub |
        {
          "Rules": [
            {
              "ResourceType": "collection",
              "Resource": ["collection/${EnvironmentName}-opensearch-secondary"]
            }
          ],
          "AWSOwnedKey": true
        }

  OpenSearchNetworkPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub '${EnvironmentName}-network-secondary'
      Type: network
      Policy: !Sub 
        - |
          [
            {
              "Rules": [
                {
                  "ResourceType": "collection",
                  "Resource": ["collection/${EnvironmentName}-opensearch-secondary"]
                },
                {
                  "ResourceType": "dashboard",
                  "Resource": ["collection/${EnvironmentName}-opensearch-secondary"]
                }
              ],
              "AllowFromPublic": false,
              "SourceVPCEs": ["${VPCEndpointId}"]
            }
          ]
        - VPCEndpointId: !Ref VPCEndpoint

  OpenSearchDataAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    Properties:
      Name: !Sub '${EnvironmentName}-data-access-secondary'
      Type: data
      Policy: !Sub |
        [
          {
            "Rules": [
              {
                "ResourceType": "index",
                "Resource": ["index/${EnvironmentName}-opensearch-secondary/*"],
                "Permission": [
                  "aoss:CreateIndex",
                  "aoss:DeleteIndex",
                  "aoss:UpdateIndex",
                  "aoss:DescribeIndex",
                  "aoss:ReadDocument",
                  "aoss:WriteDocument"
                ]
              },
              {
                "ResourceType": "collection",
                "Resource": ["collection/${EnvironmentName}-opensearch-secondary"],
                "Permission": ["aoss:CreateCollectionItems"]
              }
            ],
            "Principal": [
              "${OSIPipelineRole.Arn}",
              "arn:aws:iam::${AWS::AccountId}:root"
            ]
          }
        ]

  # VPC Endpoint for OpenSearch Serverless
  VPCEndpoint:
    Type: AWS::OpenSearchServerless::VpcEndpoint
    Properties:
      Name: !Sub '${EnvironmentName}-aoss-vpce-secondary'
      VpcId: !If 
        - UseExistingVPCCondition
        - !Ref VpcId
        - Fn::ImportValue: !Sub '${EnvironmentName}-vpc-id'
      SubnetIds: !If
        - UseExistingVPCCondition
        - !Ref PrivateSubnetIds
        - - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-1'
          - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-2'
          - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-3'
      SecurityGroupIds:
        - !Ref OpenSearchVPCESecurityGroup

  OpenSearchVPCESecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${EnvironmentName}-aoss-vpce-secondary-sg'
      GroupDescription: Security group for OpenSearch Serverless VPC Endpoint
      VpcId: !If 
        - UseExistingVPCCondition
        - !Ref VpcId
        - Fn::ImportValue: !Sub '${EnvironmentName}-vpc-id'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref MSKSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-aoss-vpce-secondary-sg'

  # IAM Role for OSI Pipeline
  OSIPipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${EnvironmentName}-osi-pipeline-secondary-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: osis-pipelines.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/CloudWatchLogsFullAccess'
      Policies:
        - PolicyName: MSKAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'kafka-cluster:Connect'
                  - 'kafka-cluster:DescribeCluster'
                  - 'kafka-cluster:ReadData'
                  - 'kafka-cluster:DescribeTopic'
                  - 'kafka-cluster:DescribeGroup'
                  - 'kafka-cluster:AlterGroup'
                Resource:
                  - !GetAtt MSKCluster.Arn
                  - !Sub '${MSKCluster.Arn}/*'
              - Effect: Allow
                Action:
                  - 'kafka:DescribeCluster'
                  - 'kafka:DescribeClusterV2'
                  - 'kafka:GetBootstrapBrokers'
                Resource:
                  - !GetAtt MSKCluster.Arn
        - PolicyName: OpenSearchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'aoss:APIAccessAll'
                  - 'aoss:BatchGetCollection'
                Resource: !Sub 'arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/*'
        - PolicyName: S3DLQAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:PutObject'
                  - 's3:GetObject'
                  - 's3:ListBucket'
                Resource:
                  - !GetAtt DLQBucket.Arn
                  - !Sub '${DLQBucket.Arn}/*'

  # OSI Pipeline
  OSIPipeline:
    Type: AWS::OSIS::Pipeline
    Condition: DeployOSIPipelineCondition
    DependsOn:
      - OpenSearchCollection
      - MSKCluster
    Properties:
      PipelineName: !Sub '${EnvironmentName}-osi-secondary'
      MinUnits: !Ref OSIMinCapacity
      MaxUnits: !Ref OSIMaxCapacity
      VpcOptions:
        SubnetIds: !If
          - UseExistingVPCCondition
          - !Ref PrivateSubnetIds
          - - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-1'
            - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-2'
            - Fn::ImportValue: !Sub '${EnvironmentName}-private-subnet-3'
        SecurityGroupIds:
          - !Ref MSKSecurityGroup
      PipelineConfigurationBody: !Sub 
        - |
          version: "2"
          kafka-pipeline:
            source:
              kafka:
                acknowledgments: true
                topics:
                  - name: "${KafkaTopicName}"
                    group_id: "osi-consumer-group-secondary"
                aws:
                  msk:
                    arn: "${MSKClusterArn}"
                  region: "${AWS::Region}"
                  sts_role_arn: "${OSIPipelineRoleArn}"
            sink:
              - opensearch:
                  hosts:
                    - "${OpenSearchEndpoint}"
                  index: "application-logs-${!yyyy.MM.dd}"
                  aws:
                    serverless: true
                    region: "${AWS::Region}"
                    sts_role_arn: "${OSIPipelineRoleArn}"
                  dlq:
                    s3:
                      bucket: "${DLQBucketName}"
                      region: "${AWS::Region}"
                      sts_role_arn: "${OSIPipelineRoleArn}"
        - MSKClusterArn: !GetAtt MSKCluster.Arn
          OpenSearchEndpoint: !GetAtt OpenSearchCollection.CollectionEndpoint
          DLQBucketName: !Ref DLQBucket
          OSIPipelineRoleArn: !GetAtt OSIPipelineRole.Arn
      LogPublishingOptions:
        IsLoggingEnabled: true
        CloudWatchLogDestination:
          LogGroup: !Sub '/aws/vendedlogs/osis/${EnvironmentName}-secondary'

  # CloudWatch Log Group for OSI
  OSILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/vendedlogs/osis/${EnvironmentName}-secondary'
      RetentionInDays: 7

  # CloudWatch Alarms
  MSKReplicationLagAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${EnvironmentName}-msk-replication-lag-secondary'
      AlarmDescription: Alert when MSK replication lag exceeds threshold
      MetricName: ReplicationLatency
      Namespace: AWS/Kafka
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 60000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: Cluster Name
          Value: !Sub '${EnvironmentName}-msk-secondary'

  OSIPipelineFailuresAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: DeployOSIPipelineCondition
    Properties:
      AlarmName: !Sub '${EnvironmentName}-osi-failures-secondary'
      AlarmDescription: Alert when OSI pipeline has high failure rate
      MetricName: DocumentsFailed
      Namespace: AWS/OSIS
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: PipelineName
          Value: !Sub '${EnvironmentName}-osi-secondary'

Outputs:
  MSKClusterArn:
    Description: ARN of the MSK cluster
    Value: !GetAtt MSKCluster.Arn
    Export:
      Name: !Sub '${EnvironmentName}-msk-secondary-arn'

  MSKBootstrapServers:
    Description: MSK bootstrap servers with IAM authentication
    Value: !GetAtt MSKBootstrapBrokers.BootstrapBrokersSaslIam
    Export:
      Name: !Sub '${EnvironmentName}-msk-secondary-bootstrap'

  MSKSecurityGroupId:
    Description: Security group ID for MSK cluster
    Value: !Ref MSKSecurityGroup
    Export:
      Name: !Sub '${EnvironmentName}-msk-secondary-sg'

  MSKReplicatorArn:
    Condition: DeployMSKReplicatorCondition
    Description: ARN of MSK Replicator
    Value: !GetAtt MSKReplicator.ReplicatorArn
    Export:
      Name: !Sub '${EnvironmentName}-msk-replicator-arn'

  OpenSearchCollectionArn:
    Description: ARN of OpenSearch Serverless collection
    Value: !GetAtt OpenSearchCollection.Arn
    Export:
      Name: !Sub '${EnvironmentName}-opensearch-secondary-arn'

  OpenSearchCollectionEndpoint:
    Description: Endpoint of OpenSearch Serverless collection
    Value: !GetAtt OpenSearchCollection.CollectionEndpoint
    Export:
      Name: !Sub '${EnvironmentName}-opensearch-secondary-endpoint'

  OSIPipelineArn:
    Condition: DeployOSIPipelineCondition
    Description: ARN of OSI pipeline
    Value: !GetAtt OSIPipeline.PipelineArn
    Export:
      Name: !Sub '${EnvironmentName}-osi-secondary-arn'

  DLQBucketName:
    Description: Name of DLQ S3 bucket
    Value: !Ref DLQBucket
    Export:
      Name: !Sub '${EnvironmentName}-dlq-bucket-secondary'

  OSIPipelineRoleArn:
    Description: ARN of OSI pipeline IAM role
    Value: !GetAtt OSIPipelineRole.Arn
    Export:
      Name: !Sub '${EnvironmentName}-osi-role-secondary-arn'
